<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puzzle Playhouse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HERO SECTION -->
    <header class="hero">
        
        <img src="logo.png" class="logo" alt="Puzzle Playhouse Logo">

        <h1>Puzzle Playhouse</h1>
        <p class="tagline">Free puzzles, brain‑boosting fun, and creative puzzle books.</p>
        <a href="#free-pack" class="button hero-btn">Get Your Free Puzzle Pack</a>
    </header>

    <!-- FREE PACK SECTION -->
    <section id="free-pack" class="section">
        <h2>Download Your Free Puzzle Pack</h2>
        <p>Enter your email to receive printable puzzles.</p>

        <div class="email-box">
            <input type="email" placeholder="Enter your email">
            <button>Get Free Puzzles</button>
        </div>
    </section>

    <!-- BOOKS SECTION -->
    <section class="section">
        <h2>Explore Puzzle Playhouse Books</h2>
        <p>Love puzzles? Discover more books here.</p>
        <a href="https://www.amazon.co.uk/stores/Andrew-Heynes/author/B0FD8NRPZJ?ref=ap_rdr&shoppingPortalEnabled=true" class="button" target="_blank">View Puzzle Books</a>
    </section>

    <footer>
        © Puzzle Playhouse
    </footer>

    
</body>
</html>
