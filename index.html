<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Puzzle Playhouse</title>

<style>
body{
    background:black;
    color:silver;
    font-family:Arial, Helvetica, sans-serif;
    text-align:center;
    margin:0;
    padding:0;
}

.container{
    max-width:900px;
    margin:auto;
    padding:40px 20px;
}

/* LOGO */
.logo{
    width:100px;
    margin-bottom:10px;
}

/* HEADINGS */
h1{
    font-size:42px;
    margin:10px 0;
}

h2{
    margin-top:40px;
}

h3.follow-heading{
    margin-top:50px;
    font-size:20px;
}

/* TEXT */
p{
    font-size:18px;
    line-height:1.6;
}

/* BUTTONS — GOLD GLOW */
.button{
    display:block;
    margin:15px auto;
    padding:14px 28px;
    width:260px;
    font-size:18px;
    color:black;
    background:silver;
    text-decoration:none;
    border-radius:6px;
    font-weight:bold;
    transition:0.3s ease;
    box-shadow:0 0 0px gold;
}

.button:hover{
    background:#ffd700;
    color:black;
    box-shadow:0 0 15px #ffd700, 0 0 25px #ffea80;
    transform:translateY(-2px);
}

/* SOCIAL ICONS — UNIFORM SIZE */
.social-links {
    margin-top: 40px;
    display: flex;
    justify-content: center;
    gap: 25px;
    margin-bottom: 40px;
}

.social-links a {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.social-links img,
.icon {
    width: 100%;
    height: 100%;
    object-fit: contain;
    transition: transform 0.2s ease, opacity 0.2s ease;
}

.social-links img:hover {
    transform: scale(1.1);
    opacity: 0.85;
}

.icon-youtube {
    transform: scale(1.25);
}

.icon-pinterest {
    transform: scale(0.85);
}

/* FOOTER — BOLD, SILVER, SPACED */
footer{
    margin-top:50px;
    font-size:14px;
    font-weight:bold;
    color:silver;
    letter-spacing:1.5px;
    opacity:1;
}

.footer-links{
    margin-top:10px;
    display:flex;
    justify-content:center;
    gap:25px;
}

.footer-links a{
    color:silver;
    text-decoration:none;
    font-weight:bold;
    letter-spacing:1px;
    transition:0.2s ease;
}

.footer-links a:hover{
    color:#ffd700;
    text-shadow:0 0 8px #ffd700;
}
</style>

</head>
<body>
