<!DOCTYPE html>
<html>
<head>
    <title>Puzzle Playhouse Books</title>
    
    <style>
        .badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: #ffd700;
    color: black;
    padding: 6px 10px;
    font-size: 12px;
    font-weight: bold;
    border-radius: 5px;
    box-shadow: 0 0 6px rgba(0,0,0,0.2);
    z-index: 10;
}

.card {
    position: relative; /* enables badge positioning */
}
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background-color: #f5f5f5;
    }

    .container {
        max-width: 1000px;
        margin: auto;
        padding: 20px;
    }

    h1, h2 {
        text-align: center;
    }

    .intro {
        text-align: center;
        margin-bottom: 40px;
    }

   /* BOOK CARD */
.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    text-align: center;
    min-height: 380px;
}

/* FIXED IMAGE SIZING */
.book-card img {
    width: 100%;
    height: 260px;
    object-fit: contain;   /* shows whole image */
    background: #fff;      /* clean backdrop */
    padding: 10px;         /* evens out transparent edges */
    border-radius: 8px;
}

.card h3 {
    margin-top: 0;
}

.card {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

    /* BUTTON */
    .btn {
        display: inline-block;
        margin-top: 10px;
        padding: 10px 15px;
        background: black;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        transition: 0.25s ease;
    }

    /* GOLD HOVER EFFECT */
    .btn:hover {
        background: #ffd700;
        color: black;
        box-shadow: 0 0 12px #ffd700;
    }

    /* CTA */
    .cta {
        text-align: center;
        margin-top: 50px;
        padding: 30px;
        background: black;
        color: white;
        border-radius: 10px;
    }

    .cta a {
        background: white;
        color: black;
        padding: 10px 20px;
        text-decoration: none;
        border-radius: 5px;
        transition: 0.25s ease;
    }

    .cta a:hover {
        background: #ffd700;
        color: black;
        box-shadow: 0 0 12px #ffd700;
    }
        /* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin-top: 30px;
 }

   /* FOOTER */
.footer {
    text-align: center;
    margin-top: 90px;
    padding: 40px 0;
}

.footer-logo-wrapper {
    display: flex;
    justify-content: center;
    margin-bottom: 15px;
}

.footer-logo {
    width: 55px;        /* controls size */
    height: auto;
    display: block;
    margin: 0 auto;     /* ensures centering */
    transition: transform 0.25s ease, filter 0.25s ease;
    filter: drop-shadow(0 0 4px rgba(0,0,0,0.2));
}

.footer-logo:hover {
    transform: scale(1.15);
    filter: drop-shadow(0 0 8px rgba(0,0,0,0.35));
}

.footer-links {
    display: flex;
    justify-content: center;
    gap: 25px;
}

.footer-links a {
    color: black;
    text-decoration: none;
    font-size: 14px;
    opacity: 0.8;
}

.footer-links a:hover {
    opacity: 1;
    text-decoration: underline;
}
</style>
    
</head>

<body>

<div class="container">

    <h1>📚 Puzzle Playhouse Books</h1>
    <p class="intro">
        Explore our collection of puzzle books, journals, and activity books designed for fun, focus, and relaxation.
    </p>

    <!-- BOOK GRID -->
    <div class="grid" id="bookGrid"></div>

    <!-- CTA -->
    <div class="cta">
        <h2>🎁 Get Free Puzzles</h2>
        <p>Join our community and receive exclusive puzzles and updates.</p>
        <a href="sign_up.html">Sign Up</a>
    </div>

</div>

<!-- Footer -->
<footer class="footer">
    <div class="footer-logo-wrapper">
        <a href="index.html">
            <img src="logo.png" alt="Puzzle Playhouse Logo" class="footer-logo">
        </a>
    </div>

    <div class="footer-links">
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="privacy.html">Privacy_Policy</a>
        <a href="terms.html">Terms</a>
    </div>
</footer>
<script>
fetch('books.json')
  .then(response => response.json())
  .then(data => {
    const grid = document.getElementById('bookGrid');

    data.forEach(book => {
      const card = document.createElement('div');
      card.className = 'card';

      card.innerHTML = `
        ${book.newRelease ? '<div class="badge">NEW RELEASE</div>' : ''}
    <img src="${book.image}" alt="${book.title}">
    <h3>${book.emoji} ${book.title}</h3>
    <p>${book.description}</p>
    <a href="${book.link}" class="btn" target="_blank">View Book</a>
      `;

      grid.appendChild(card);
    });
  });
</script>
    
</body>
</html>
