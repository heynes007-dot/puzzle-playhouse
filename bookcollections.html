<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Explore Our Books</title>
    <link rel="stylesheet" href="style.css">

    <style>
        /* Page container */
        .container {
            max-width: 900px;
            margin: 60px auto;
            padding: 0 20px;
            text-align: center;
        }

        h1 {
            font-size: 2.6rem;
            margin-bottom: 10px;
        }

        p.intro {
            font-size: 1.15rem;
            color: #555;
            margin-bottom: 50px;
        }

        /* Category grid */
        .categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 28px;
        }

        /* Category card */
        .category-card {
            background: #fff;
            padding: 28px 22px;
            border-radius: 14px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .category-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.15);
        }

        /* Optional category illustration */
        .category-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 16px;
            opacity: 0.9;
        }

        .category-card h2 {
            margin-bottom: 10px;
            font-size: 1.4rem;
        }

        .category-card p {
            color: #666;
            margin-bottom: 20px;
            font-size: 1rem;
        }
