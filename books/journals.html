<!DOCTYPE html>
<html>
<head>
    <title>Puzzle Book Collections | Word Search, Crossword & Activity Books</title>
<meta name="description" content="Browse our collection of puzzle books including word searches, crosswords, and activity books for kids. Fun, engaging, and educational.">
<meta name="keywords" content="puzzle book collection, kids activity books, word search books, crossword books, puzzle playhouse books">

    <!-- Load your global stylesheet -->
   <link rel="stylesheet" href="/puzzle-playhouse/style.css">

    <!-- Page‑specific styles ONLY -->
    <style>
        .badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #ffd700;
            color: black;
            padding: 6px 10px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 5px;
            box-shadow: 0 0 6px rgba(0,0,0,0.2);
            z-index: 10;
        }

        /* Card layout (kept here because it is unique to this page) */
        .card {
            position: relative;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
            min-height: 380px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>📚 Puzzle Playhouse Books</h1>
    <p class="intro">
        Explore our collection of Journals designed for self help, and relaxation.
    </p>

    <!-- BOOK GRID -->
    <div class="grid" id="bookGrid"></div>

    <!-- CTA -->
    <div class="cta">
        <h2>🎁 Get Free Puzzles</h2>
        <p>Join our community and receive exclusive puzzles and updates.</p>
        <a href="/puzzle-playhouse/sign_up.html">Sign Up</a>
    </div>

</div>

<!-- Footer -->
<footer class="footer">
    <div class="footer-logo-wrapper">
        <a href="/puzzle-playhouse/index.html">
            <img src="/puzzle-playhouse/logo.png" alt="Puzzle Playhouse Logo" class="footer-logo">
        </a>
    </div>

    <div class="footer-links">
        <a href="/puzzle-playhouse/About.html">About</a>
        <a href="/puzzle-playhouse/contact.html">Contact</a>
        <a href="puzzle-playhouse/Privacy_Policy.html">/Privacy Policy</a>
        <a href="/puzzle-playhouse/terms.html">Terms</a>
    </div>
</footer>

<script>
fetch('journals.json')
  .then(response => response.json())
  .then(data => {
    const grid = document.getElementById('bookGrid');

    data.forEach(book => {
      const card = document.createElement('div');
      card.className = 'card';

      card.innerHTML = `
        ${book.newRelease ? '<div class="badge">NEW RELEASE</div>' : ''}

        <div class="image-frame">
            <img src="${book.image}" alt="${book.title}">
        </div>

        <h3>${book.emoji} ${book.title}</h3>
        <p>${book.description}</p>
        <a href="${book.link}" class="btn" target="_blank">View Book</a>
      `;

      grid.appendChild(card);
    });
  });
</script>

</body>
</html>
