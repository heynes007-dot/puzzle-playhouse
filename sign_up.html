<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Join the Puzzle Playhouse Email List</title>

<style>
body{
    background:black;
    color:silver;
    font-family:Arial, Helvetica, sans-serif;
    text-align:center;
    margin:0;
    padding:0;
}

.container{
    max-width:900px;
    margin:auto;
    padding:40px 20px;
}

/* HEADER LINK WITH LOGO */
.header {
    margin-bottom: 20px;
}

.home-link {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    color: silver;
    text-decoration: none;
    font-size: 42px;
    font-weight: bold;
}

.home-link:hover {
    color: #dcdcdc;
}

.header-logo {
    width: 60px;
    height: auto;
    filter: drop-shadow(0 0 6px rgba(255,255,255,0.2));
}

/* HEADINGS & TEXT */
h2{
    color:silver;
    margin-top:40px;
}

p{
    color:silver;
    font-size:18px;
    line-height:1.6;
}

/* BUTTONS */
.button{
    display:inline-block;
    margin:20px 10px 0;
    padding:12px 24px;
    font-size:16px;
    color:black;
    background:silver;
    text-decoration:none;
    border-radius:6px;
    font-weight:bold;
}

.button:hover{
    background:#c0c0c0;
}

/* SOCIAL ICONS */
.follow-heading{
    margin-top:50px;
    font-size:20px;
}

.socials{
    margin-top:15px;
}

.socials a{
    margin:0 10px;
    display:inline-block;
}

.socials img{
    width:30px;
    filter: brightness(0) invert(0.9);
    transition:0.3s;
}

.socials img:hover{
    filter: brightness(1) sepia(1) saturate(5) hue-rotate(20deg);
}

/* FOOTER */
footer{
    margin-top:40px;
    font-size:14px;
    opacity:0.7;
}
</style>

</head>
<body>

<div class="container">

    <!-- CLICKABLE HEADER -->
    <div class="header">
        <a href="index.html" class="home-link">
            <img src="logo.png" alt="Puzzle Playhouse Logo" class="header-logo">
            <span>Puzzle Playhouse</span>
        </a>
    </div>

    <h2>Join the Puzzle Playhouse Email List</h2>

    <p>Sign up to receive free monthly puzzles, colouring pages, and special bonuses.</p>

    <!-- MAILERLITE FORM -->
    <div class="ml-embedded" data-form="eMFUOQ"></div>
    <script src="https://assets.mailerlite.com/js/universal.js" defer></script>

    <!-- NAV BUTTONS -->
    <div>
        <a class="button" href="index.html">⬅ Back to Home</a>
        <a class="button" href="monthly-puzzle.html">🎁 Monthly Free Puzzle</a>
    </div>

    <!-- SOCIAL MEDIA -->
    <h3 class="follow-heading">Follow Us</h3>
    <div class="socials">
        <a href="https://www.facebook.com/" target="_blank" aria-label="Facebook">
            <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/facebook.svg" alt="Facebook">
        </a>
        <a href="https://www.instagram.com/ah10admi" target="_blank" aria-label="Instagram">
            <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/instagram.svg" alt="Instagram">
        </a>
        <a href="https://www.youtube.com/@AHPuzzles" target="_blank" aria-label="YouTube">
            <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/youtube.svg" alt="YouTube">
        </a>
        <a href="https://uk.pinterest.com/Puzzle_Playhouse/" target="_blank" aria-label="Pinterest">
            <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/pinterest.svg" alt="Pinterest">
        </a>
    </div>

    <footer>
        <p>© Puzzle Playhouse – Email Sign‑Up</p>
    </footer>

</div>

</body>
</html>
